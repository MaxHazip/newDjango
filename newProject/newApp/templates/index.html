<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul>
        {% for book in books %}
            <li>
                <h2>{{ book.name }}</h2>
                <p>{{ book.year }}</p>
                {% for author in book.author.all %}
                <a href="/author/{{ author.id }}">{{ author.name }}</a>
                {% endfor %}                
            </li>
        {% endfor %}
    </ul>
</body>
</html>
